<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Requests - SATYUG HINDU ARMY</title>
    <meta name="theme-color" content="#ff9933">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans', sans-serif; padding: 2rem; background: #f8fafc; color: #1e293b; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 2rem; border-radius: 1rem; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #ff9933; text-align: center; margin-bottom: 2rem; }
        .recruit-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid #e2e8f0; }
        .recruit-info { display: flex; flex-direction: column; }
        .recruit-name { font-weight: bold; font-size: 1.1rem; }
        .recruit-phone { color: #64748b; font-size: 0.9rem; }
        .btn { padding: 0.5rem 1rem; border: none; border-radius: 0.25rem; cursor: pointer; color: white; font-weight: bold; transition: 0.2s; }
        .btn-approve { background: #22c55e; margin-right: 0.5rem; }
        .btn-approve:hover { background: #16a34a; }
        .btn-reject { background: #ef4444; }
        .btn-reject:hover { background: #dc2626; }
        .status { font-weight: bold; }
        .status.Approved { color: #22c55e; }
        .status.Rejected { color: #ef4444; }
        .status.Pending { color: #ff9933; }
        
        /* Security Log Styles */
        .log-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 1rem; margin-top: 1rem; }
        .log-card { background: #f1f5f9; padding: 0.5rem; border-radius: 0.5rem; text-align: center; }
        .log-img { width: 100%; height: auto; border-radius: 0.25rem; border: 1px solid #cbd5e1; }
        .log-meta { font-size: 0.8rem; color: #64748b; margin-top: 0.5rem; }
        .section-title { margin-top: 3rem; border-top: 2px solid #e2e8f0; padding-top: 2rem; }
        .clear-btn { background: #64748b; font-size: 0.8rem; margin-left: 10px; }
        
        /* Gallery Log Styles */
        .gallery-log-list { list-style: none; padding: 0; margin-top: 1rem; }
        .gallery-log-item { padding: 0.5rem; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; font-size: 0.9rem; }

        /* Mobile Optimizations */
        @media (max-width: 600px) {
            body { padding: 1rem; }
            .container { padding: 1rem; }
            .recruit-item { 
                flex-direction: column; 
                align-items: flex-start; 
                gap: 0.8rem; 
            }
            .recruit-item > div:last-child { width: 100%; display: flex; gap: 0.5rem; }
            .btn { flex: 1; text-align: center; margin-right: 0; }
            .log-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="container" id="mainContent" style="display:none;">
        <h1>Recruitment Requests</h1>
        <div id="recruitsList"></div>

        <h2 class="section-title">Security Logs (Visitor Photos) <button class="btn clear-btn" onclick="clearLogs()">Clear Logs</button></h2>
        <div id="securityLogs" class="log-grid"></div>

        <h2 class="section-title">Gallery Access Logs <button class="btn clear-btn" onclick="clearGalleryLogs()">Clear Logs</button></h2>
        <ul id="galleryLogs" class="gallery-log-list"></ul>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="index.html" style="color: #64748b; text-decoration: none;">&larr; Back to Website</a>
        </div>
    </div>

    <script>
        // Password Protection
        const password = prompt("Enter Admin Password:");
        if (password === "raam") {
            document.getElementById('mainContent').style.display = 'block';
            loadRecruits();
            loadSecurityLogs();
            loadGalleryLogs();
        } else {
            alert("Access Denied");
            window.location.href = "index.html";
        }

        function loadRecruits() {
            const STORAGE_KEY = 'satyug_recruits';
            const recruits = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            const list = document.getElementById('recruitsList');
            list.innerHTML = '';

            if (recruits.length === 0) {
                list.innerHTML = '<p style="text-align:center; color:#64748b;">No requests found.</p>';
                return;
            }

            recruits.forEach((r, i) => {
                const div = document.createElement('div');
                div.className = 'recruit-item';
                
                let actions = '';
                if (r.status === 'Pending') {
                    actions = `
                        <div>
                            <button class="btn btn-approve" onclick="updateStatus(${i}, 'Approved')">Accept</button>
                            <button class="btn btn-reject" onclick="updateStatus(${i}, 'Rejected')">Reject</button>
                        </div>
                    `;
                } else {
                    actions = `<span class="status ${r.status}">${r.status}</span>`;
                }

                div.innerHTML = `
                    <div class="recruit-info">
                        <span class="recruit-name">${r.name}</span>
                        <span class="recruit-phone">${r.phone}</span>
                    </div>
                    ${actions}
                `;
                list.appendChild(div);
            });
        }

        function loadSecurityLogs() {
            const logs = JSON.parse(localStorage.getItem('satyug_security_logs')) || [];
            const grid = document.getElementById('securityLogs');
            grid.innerHTML = '';

            if (logs.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; text-align:center; color:#64748b;">No visitor logs yet.</p>';
                return;
            }

            logs.forEach(log => {
                const div = document.createElement('div');
                div.className = 'log-card';
                div.innerHTML = `
                    <img src="${log.image}" class="log-img" alt="Visitor">
                    <div class="recruit-name" style="font-size: 0.9rem; margin-top: 5px;">${log.name}</div>
                    <div class="log-meta">${log.time}</div>
                `;
                grid.appendChild(div);
            });
        }

        function loadGalleryLogs() {
            const logs = JSON.parse(localStorage.getItem('satyug_gallery_logs')) || [];
            const list = document.getElementById('galleryLogs');
            list.innerHTML = '';

            if (logs.length === 0) {
                list.innerHTML = '<li style="text-align:center; color:#64748b;">No gallery access logs yet.</li>';
                return;
            }

            logs.forEach(log => {
                const li = document.createElement('li');
                li.className = 'gallery-log-item';
                li.innerHTML = `
                    <span style="font-weight:bold;">${log.name}</span>
                    <span style="color:#64748b;">${log.time}</span>
                `;
                list.appendChild(li);
            });
        }

        window.clearLogs = () => {
            if(confirm("Delete all security photos?")) {
                localStorage.removeItem('satyug_security_logs');
                loadSecurityLogs();
            }
        }

        window.clearGalleryLogs = () => {
            if(confirm("Delete all gallery access logs?")) {
                localStorage.removeItem('satyug_gallery_logs');
                loadGalleryLogs();
            }
        }

        window.updateStatus = (index, status) => {
            const STORAGE_KEY = 'satyug_recruits';
            const recruits = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            recruits[index].status = status;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(recruits));
            loadRecruits();
        }
    </script>
</body>
</html>
